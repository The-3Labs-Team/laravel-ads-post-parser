name: PHPStan

on:
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'composer.json'
      - 'composer.lock'
  push:
    branches:
      - main
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'composer.json'
      - 'composer.lock'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=1G --error-format=github
